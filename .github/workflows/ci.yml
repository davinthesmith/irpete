# Catalog pytest (headless) + Emitter firmware compile — see plans/build/README.md
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Tests use fixtures/monkeypatch; this avoids accidental bare ``load_settings()`` failures if env is empty.
env:
  IRPETE_API_KEY: ci-ephemeral-placeholder-not-for-production
  PIP_DISABLE_PIP_VERSION_CHECK: 1
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: catalog
    steps:
      # Sparse paths: catalog/tests/test_ci_release_contract.py, test_firmware_emitter_contract.py
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            catalog
            firmware/emitter
            .github/workflows

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.11"
          working-directory: catalog
          enable-cache: true

      - name: Install package + dev deps
        run: uv pip install -e ".[dev]"

      - name: Pytest
        run: pytest -q

  firmware:
    name: Firmware (PlatformIO)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/emitter
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            firmware/emitter

      - uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            firmware/emitter/.pio
          key: platformio-${{ runner.os }}-${{ hashFiles('firmware/emitter/platformio.ini', 'firmware/emitter/extra_scripts/**') }}-${{ hashFiles('firmware/emitter/src/**') }}
          restore-keys: |
            platformio-${{ runner.os }}-${{ hashFiles('firmware/emitter/platformio.ini', 'firmware/emitter/extra_scripts/**') }}-
            platformio-${{ runner.os }}-

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: firmware/emitter/requirements-pio.txt

      - name: Install PlatformIO
        run: pip install -r requirements-pio.txt

      - name: pio run (d1_mini)
        run: pio run -e d1_mini
